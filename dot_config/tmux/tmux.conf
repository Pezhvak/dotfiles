# General Configurations
set-window-option -g mode-keys vi
set -g history-limit 10000
set -g prefix C-a
set -g mouse on
set -s escape-time 0
set -g focus-events on # forward FocusGained/FocusLost so nvim autoread/gitsigns react

# Window configuration
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
# Use pane_title (set via OSC 2 by nvim's titlestring) when nvim is the
# foreground program; otherwise fall back to the running command.
set -g automatic-rename-format "#{?#{==:#{pane_current_command},nvim},#{pane_title},#{pane_current_command}}"
setw -g monitor-activity on

# Improve colors
set -g default-terminal "tmux-256color"

# Enable true color (24-bit) for the outer terminal
set -ga terminal-features ",xterm-256color:RGB"

# Enable undercurl
set -a terminal-overrides ",*Smulx=\E[4::%p1%dm"

# Enable undercurl colors
set -a terminal-overrides ',*Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Binding copy keys to vi like shortcuts
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

bind Tab last-window

# Change default prefix key to ctrl+a
unbind C-b
bind-key C-a send-prefix

# Change pane creation keys
unbind %
bind | split-window -h

unbind '"'
bind _ split-window -v

# Adding resize pane keys
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Adding maximize and minize pane key
bind -r m resize-pane -Z

# Reload tmux config
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# vim-tmux-navigator: seamless C-h/j/k/l between tmux panes and vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

# Enter copy mode with C-Space (mirrors nvim's terminal-mode escape).
# When nvim is foreground, forward the key so nvim's own <C-Space> still works.
bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'copy-mode'
bind-key -T copy-mode-vi 'C-Space' send -X cancel

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Enabling Plugin Manager
set -g @plugin 'tmux-plugins/tpm'

# List of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # save state automatically
set -g @plugin 'jimeh/tmux-themepack'

# Enabling save/restore state
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
# set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
# set -g @continuum-restore 'on' # enable tmux-continuum functionality

# Setting theme
set -g @themepack 'powerline/double/cyan'

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
